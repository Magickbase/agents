name: Update K8S workload image
on:
  workflow_call:
    inputs:
      image-tag:
        required: true
        type: string
      k8s-namespace:
        required: true
        type: string
      k8s-workload:
        required: true
        type: string
    secrets:
      KUBOARD_USERNAME:
        required: true
      KUBOARD_ACCESS_KEY:
        required: true
      KUBOARD_API_URL:
        required: true
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Update image on K8S
        id: http-request
        uses: fjogeleit/http-request-action@v1
        with:
          url: ${{ secrets.KUBOARD_API_URL }}
          method: 'PUT'
          customHeaders: '{"Content-Type": "application/json", "Cookie": "KuboardUsername=${{ secrets.KUBOARD_USERNAME }}; KuboardAccessKey=${{ secrets.KUBOARD_ACCESS_KEY }}"}'
          data: '{"kind":"deployments","namespace":"${{ inputs.k8s-namespace }}","name":"${{ inputs.k8s-workload }}","images":{"ghcr.io/magickbase/agents":"ghcr.io/magickbase/agents:${{ inputs.image-tag }}"}}'
